<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Body · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 1100px; margin: 0 auto; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-tertiary); text-decoration: none; font-size: 13px; font-weight: 600;
  margin-bottom: 14px; -webkit-tap-highlight-color: transparent;
}
.back-link:hover { color: var(--text-primary); }
.dash-title {
  margin: 0 0 18px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== BENTO GRID ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}
.tile {
  --accent: #6BE3A4;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  padding: 20px;
  border-radius: 18px;
  text-decoration: none;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}
.tile::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 78% 18%,
              color-mix(in srgb, var(--accent) 22%, transparent), transparent 55%);
  opacity: 0.7; transition: opacity 0.18s ease;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 40%, transparent);
  box-shadow: 0 16px 48px rgba(0,0,0,0.55);
}
.tile:hover::before { opacity: 1; }

.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

.tile-top { display: flex; align-items: flex-start; justify-content: space-between; }
.tile-num {
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.08em; color: var(--text-tertiary);
}
.tile-emoji {
  font-size: 26px; line-height: 1;
  filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 60%, transparent));
}
.tile-spacer { flex: 1; }
.tile-title {
  font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text-primary); margin: 0 0 4px;
}
.tile.big .tile-title { font-size: 28px; }
.tile-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.tile-sub {
  font-size: 13px; color: var(--text-tertiary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
}
.tile-arrow {
  font-size: 18px; color: var(--accent);
  transition: transform 0.18s ease; flex-shrink: 0;
}
.tile:hover .tile-arrow { transform: translateX(4px); }

@media (max-width: 720px) {
  .bento { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 150px; }
  .tile.big { grid-column: span 2; grid-row: span 1; }
  .tile.big .tile-title { font-size: 22px; }
}
@media (max-width: 440px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .bento { grid-template-columns: 1fr; grid-auto-rows: 132px; }
  .tile.big, .tile.wide { grid-column: span 1; }
}
</style>
</head>
<body>
<div class="page">

  <a class="back-link" href="index.html">← Dashboard</a>
  <h1 class="dash-title">Body</h1>

  <div class="bento">
    <!-- Small tile -->
    <a class="tile" href="health.html" style="--accent:#A7F3D0">
      <div class="tile-top">
        <span class="tile-num">·01</span>
        <span class="tile-emoji">💊</span>
      </div>
      <div class="tile-spacer"></div>
      <h2 class="tile-title">Health</h2>
      <div class="tile-foot">
        <span class="tile-sub">Supplements & vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- Small tile -->
    <a class="tile" href="po-water.html" style="--accent:#60A5FA">
      <div class="tile-top">
        <span class="tile-num">·02</span>
        <span class="tile-emoji">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <h2 class="tile-title">Water</h2>
      <div class="tile-foot">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- Small tile -->
    <a class="tile" href="caffeine.html" style="--accent:#C9A36B">
      <div class="tile-top">
        <span class="tile-num">·03</span>
        <span class="tile-emoji">☕</span>
      </div>
      <div class="tile-spacer"></div>
      <h2 class="tile-title">Caffeine</h2>
      <div class="tile-foot">
        <span class="tile-sub">Intake & timing</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- Small tile -->
    <a class="tile" href="peak.html" style="--accent:#C4B5FD">
      <div class="tile-top">
        <span class="tile-num">·04</span>
        <span class="tile-emoji">⚡</span>
      </div>
      <div class="tile-spacer"></div>
      <h2 class="tile-title">Peak</h2>
      <div class="tile-foot">
        <span class="tile-sub">Energy & recovery</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>
  </div>
</div>

<script>
(function () {
  'use strict';
  function storeGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch (e) { return null; } }
  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateToKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function activeDate6am() { const d = new Date(); if (d.getHours() < 6) d.setDate(d.getDate() - 1); return d; }
  function activeDateKey6am() { return dateToKey(activeDate6am()); }
  function plainTodayKey() { return dateToKey(new Date()); }

  function setTileSub(href, text) {
    const el = document.querySelector('.tile[href="' + href + '"] .tile-sub');
    if (el && text) el.textContent = text;
  }

  function renderHealthTile() {
    const items = storeGet('stack:items');
    if (!Array.isArray(items) || !items.length) return;
    const taken = storeGet('stack:taken:' + activeDateKey6am()) || {};
    const doneCount = items.filter(it => taken[it.id]).length;
    setTileSub('health.html', doneCount + '/' + items.length + ' supplements taken');
  }

  function renderWaterTile() {
    const state = storeGet('po_water_v1');
    if (!state || !state.profile) return;
    const p = state.profile;
    const wKg = state.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
    if (!wKg) return;
    const base = wKg * 35;
    const exercise = (p.activityHrsPerWeek || 0) / 7 * 500;
    const caffeine = Math.max(0, (state.caffeineMgPerDay || 0) - 200) * 1.5;
    let adjust = 0; if (p.sex === 'm') adjust += 200; if ((p.age || 0) >= 50) adjust += 100;
    const total = base + exercise + caffeine + adjust;
    let unitMl = 1, label = 'ml';
    if (state.unit === 'bottle') { unitMl = state.bottleMl || 500; label = 'bottles'; }
    else if (state.unit === 'glass') { unitMl = state.glassMl || 250; label = 'glasses'; }
    else if (state.unit === 'oz') { unitMl = 30; label = 'oz'; }
    const targetUnits = Math.ceil(total / unitMl);
    const count = (state.logs && state.logs[plainTodayKey()]) || 0;
    setTileSub('po-water.html', count + ' / ' + targetUnits + ' ' + label);
  }

  function renderCaffeineTile() {
    const logs = storeGet('caf:logs') || [];
    const nicLogs = storeGet('nic:logs') || [];
    if (!logs.length && !nicLogs.length) return;
    const midnight = new Date(); midnight.setHours(0, 0, 0, 0); const mt = midnight.getTime();
    const cafToday = Math.round(logs.filter(l => l.ts >= mt).reduce((a, l) => a + l.mg, 0));
    const nicToday = Math.round(nicLogs.filter(l => l.ts >= mt).reduce((a, l) => a + l.mg, 0) * 10) / 10;
    const parts = [cafToday + 'mg caffeine'];
    if (nicToday > 0) parts.push(nicToday + 'mg nicotine');
    setTileSub('caffeine.html', parts.join(' · '));
  }

  function renderPeakTile() {
    const daily = storeGet('peak:daily');
    if (!daily) return;
    const today = daily[plainTodayKey()];
    if (today) { setTileSub('peak.html', today.avgScore + ' · ' + today.tier + ' today'); return; }
    const keys = Object.keys(daily).sort();
    if (keys.length) { const last = daily[keys[keys.length - 1]]; setTileSub('peak.html', 'Last: ' + last.avgScore + ' · ' + last.tier); }
  }

  function renderSnapshot() { renderHealthTile(); renderWaterTile(); renderCaffeineTile(); renderPeakTile(); }
  renderSnapshot();
  window.addEventListener('pageshow', renderSnapshot);
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') renderSnapshot();
  });
  window.addEventListener('storage', renderSnapshot);
})();
</script>
</body>
</html>
